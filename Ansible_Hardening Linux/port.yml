---
- name: Ubah port SSH dan restart service
  hosts: all
  become: true

  tasks:

    - name: Ubah port SSH di sshd_config
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?Port'
        line: "Port 717"
        state: present
        backup: yes

    - name: Restart SSH service
      ansible.builtin.systemd:
        name: sshd
        state: restarted
        enabled: true
