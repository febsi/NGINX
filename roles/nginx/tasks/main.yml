---
- name: Install dependencies
  ansible.builtin.apt:
    name:
      - dpkg-dev
      - git
      - build-essential
      - gnupg2
      - gcc
      - cmake
      - libpcre3
      - libpcre3-dev
      - zlib1g
      - zlib1g-dev
      - libssl-dev
      - openssl
      - curl
      - unzip
      - libbrotli-dev
    state: present
    update_cache: yes

- name: Tambahkan Nginx GPG key
  ansible.builtin.get_url:
    url: https://nginx.org/keys/nginx_signing.key
    dest: /etc/apt/trusted.gpg.d/nginx_signing.asc
    mode: '0644'

- name: Tambahkan Repository Nginx
  ansible.builtin.apt_repository:
    repo: "deb http://nginx.org/packages/ubuntu noble nginx"
    state: present
    filename: "nginx"

- name: Tambahkan Repository Source Nginx
  ansible.builtin.apt_repository:
    repo: "deb-src http://nginx.org/packages/ubuntu noble nginx"
    state: present
    filename: "nginx"

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: yes

- name: Ambil source Nginx
  ansible.builtin.shell: apt-get source nginx
  args:
    chdir: "{{ nginx_src_dir }}"

- name: Clone ngx_brotli
  ansible.builtin.git:
    repo: "{{ brotli_repo }}"
    dest: "{{ nginx_src_dir }}/ngx_brotli"
    recursive: yes

- name: Tambahkan --add-module ke configure nginx
  ansible.builtin.replace:
    path: "{{ nginx_src_dir }}/nginx-{{ nginx_version }}/debian/rules"
    regexp: 'CFLAGS="" ./configure'
    replace: 'CFLAGS="" ./configure --add-module={{ nginx_src_dir }}/ngx_brotli'

- name: Tambahkan module Brotli ke config.status.nginx_debug
  ansible.builtin.replace:
    path: "{{ nginx_src_dir }}/nginx-{{ nginx_version }}/debian/rules"
    regexp: 'cd \$(BUILDDIR_nginx_debug) &&\s*CFLAGS="" ./configure'
    replace: 'cd $(BUILDDIR_nginx_debug) && CFLAGS="" ./configure --add-module={{ nginx_src_dir }}/ngx_brotli'

- name: Install build dependencies for nginx
  ansible.builtin.shell: |
    apt-get update
    apt-get build-dep -y nginx || true
    apt-get install -y debhelper quilt libpcre2-dev

- name: Compile Nginx dengan Brotli
  ansible.builtin.shell: dpkg-buildpackage -b -uc -us
  args:
    chdir: "{{ nginx_src_dir }}/nginx-{{ nginx_version }}"

- name: Install nginx hasil build
  ansible.builtin.shell: dpkg -i {{ nginx_src_dir }}/*.deb

- name: Tambahkan konfigurasi Brotli ke nginx.conf
  ansible.builtin.blockinfile:
    path: /etc/nginx/nginx.conf
    insertafter: 'http {'
    block: |
      brotli on;
      brotli_comp_level 6;
      brotli_static on;
      brotli_types text/plain text/css application/javascript application/x-javascript application/json image/svg+xml;

- name: Generate private key
  community.crypto.openssl_privatekey:
    path: "{{ ssl_key_path }}"
    size: 2048

- name: Generate self-signed certificate
  community.crypto.x509_certificate:
    path: "{{ ssl_cert_path }}"
    privatekey_path: "{{ ssl_key_path }}"
    provider: selfsigned
    selfsigned_not_after: "{{ ssl_days_valid }}"

- name: Buat konfigurasi HTTPS default
  ansible.builtin.template:
    src: default.conf.j2
    dest: /etc/nginx/conf.d/default.conf

- name: Test konfigurasi nginx
  ansible.builtin.command: nginx -t
  register: nginx_test
  ignore_errors: yes

- name: Tampilkan hasil test nginx
  ansible.builtin.debug:
    var: nginx_test.stdout

- name: Start & Enable Nginx
  ansible.builtin.systemd:
    name: nginx
    state: started
    enabled: yes

- name: Reload Nginx
  ansible.builtin.systemd:
    name: nginx
    state: reloaded
  when: nginx_test.rc == 0

- name: Cek Brotli dengan curl
  ansible.builtin.command: "curl -k -H 'Accept-Encoding: br' -I https://localhost"
  register: curl_result
  ignore_errors: yes

- name: Tampilkan hasil curl
  ansible.builtin.debug:
    var: curl_result.stdout
