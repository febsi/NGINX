# semua perintah untuk install, start service dan dploy config
---
- name: install nftables
  ansible.builtin.apt:
    name: nftables
    state: present

- name: start nftables
  ansible.builtin.systemd:
    name: nftables
    state: started
    enabled: true

- name: deploy nftables config
  ansible.builtin.template:
    src: nftables.conf.j2
    dest: /etc/nftables.conf
    owner: root
    group: root
    mode: '0644'
  notify: Reload nftables